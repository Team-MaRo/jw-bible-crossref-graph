name: Release

# Conventional-commits → release PR → tagged release. release-please scans
# commits since the last release on master, opens (or updates) a "release" PR
# with the version bump + CHANGELOG.md, and on merge cuts a GitHub Release +
# git tag (semver, no `v` prefix). The `build` job then attaches the platform
# binaries to that release in the same run — so no PAT is needed (a tag-push
# trigger would be suppressed for GITHUB_TOKEN, but a job dependency is not).
#
# Config lives in .github/release-please-config.json + .release-please-manifest.json.

on:
  push:
    branches: [master]

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    name: Release PR / GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Create release PR / GitHub Release
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

  build:
    name: Build ${{ matrix.name }}
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-amd64-gnu,  os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,   cross: true }
          - { name: linux-amd64-musl, os: ubuntu-latest,  target: x86_64-unknown-linux-musl,  cross: true }
          - { name: linux-arm64-gnu,  os: ubuntu-latest,  target: aarch64-unknown-linux-gnu,  cross: true }
          - { name: linux-arm64-musl, os: ubuntu-latest,  target: aarch64-unknown-linux-musl, cross: true }
          - { name: darwin-amd64,     os: macos-13,       target: x86_64-apple-darwin,        cross: false }
          - { name: darwin-arm64,     os: macos-latest,   target: aarch64-apple-darwin,       cross: false }
          - { name: windows-amd64,    os: windows-latest, target: x86_64-pc-windows-msvc,     cross: false, ext: .exe }
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # `cross` carries the target C toolchain that bundled SQLite needs for the
      # linux gnu/musl + aarch64 builds. macOS/Windows build natively with cargo.
      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage asset
        shell: bash
        run: |
          bin="jw-bible-crossref-graph${{ matrix.ext }}"
          asset="jw-bible-crossref-graph-${{ matrix.name }}${{ matrix.ext }}"
          cp "target/${{ matrix.target }}/release/$bin" "$asset"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          asset="jw-bible-crossref-graph-${{ matrix.name }}${{ matrix.ext }}"
          gh release upload "${{ needs.release-please.outputs.tag_name }}" "$asset" --clobber
