name: CI

on:
  push:
    branches: [master, develop]
  pull_request:

permissions:
  contents: read

jobs:
  # The whole project is one self-contained script with no test suite, so CI
  # just proves it stays importable/compilable on every supported Python and
  # catches real lint errors (syntax errors, undefined names).
  compile:
    name: Compile (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor from the README ("Python 3.8+") and the version it's tested on.
        python-version: ['3.8', '3.14']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Byte-compile the script
        run: python -m py_compile bible_circle.py

      - name: Import smoke test (matplotlib Agg backend)
        run: python -c "import matplotlib; matplotlib.use('Agg'); import matplotlib.pyplot"

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install ruff
        run: pip install ruff

      # Only the "real error" rule classes (pyflakes F-codes + pycodestyle
      # E9 syntax errors) so CI flags genuine bugs without bikeshedding style
      # on a hand-tuned single-file script.
      - name: Ruff check
        run: ruff check --select E9,F63,F7,F82 bible_circle.py
