# English labels/UI (--lang en). `abbr` and `name` must each list all 66 books
# in canonical order; `csv_header` must have 6 columns. Embedded at build time.
html_lang: en
title: Bible Cross-References
subtitle: All marginal references of the NWT Study Bible — coloured by source book; references between the Old and New Testaments highlighted
ot: OLD TESTAMENT
nt: NEW TESTAMENT
toggle: Show only references between the Old and New Testaments
reset: Reset view
hint: "scroll = zoom · drag = pan · hover a line = verses"

csv_header: [source_verse, target_verse, source_book, target_book, classification, crosses_testaments]

# New World Translation book abbreviations.
abbr: [Ge, Ex, Le, Nu, De, Jos, Jg, Ru, 1Sa, 2Sa, 1Ki, 2Ki, 1Ch, 2Ch, Ezr, Ne, Es, Job, Ps, Pr,
       Ec, Ca, Isa, Jer, La, Eze, Da, Ho, Joe, Am, Ob, Jon, Mic, Na, Hab, Zep, Hag, Zec, Mal, Mt,
       Mr, Lu, Joh, Ac, Ro, 1Co, 2Co, Ga, Eph, Php, Col, 1Th, 2Th, 1Ti, 2Ti, Tit, Phm, Heb, Jas,
       1Pe, 2Pe, 1Jo, 2Jo, 3Jo, Jude, Re]

